<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINTA - Sari Animasi Kesehatan Jantung Talang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'heart-slow': 'heartbeat 1.5s ease-in-out infinite',
                        'heart-medium': 'heartbeat 0.6s ease-in-out infinite',
                        'heart-fast': 'heartbeat 0.2s ease-in-out infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'alive': 'alive 4s ease-in-out infinite',
                        'gradient': 'gradient 4s ease infinite',
                        'blob': 'blob 10s infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' },
                        },
                        alive: {
                            '0%, 100%': { transform: 'translateY(0) scale(1)' },
                            '50%': { transform: 'translateY(-12px) scale(1.03, 0.97)' },
                            '95%': { transform: 'translateY(-1px) scale(1)' },
                            '97%': { transform: 'translateY(-1px) scale(1.05, 0.9)' },
                            '99%': { transform: 'translateY(-1px) scale(0.95, 1.05)' },
                        },
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        heartbeat: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '15%': { transform: 'scale(1.15)' },
                            '30%': { transform: 'scale(1)' },
                            '45%': { transform: 'scale(1.15)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #020617; /* slate-950 */
            color: #f8fafc;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden; /* Prevent body scroll entirely for mobile app feel */
        }
        .app-container {
            height: 100dvh;
            width: 100%;
            max-width: 28rem; /* max-w-md */
            margin: 0 auto;
            background-image: radial-gradient(circle at top right, #3b0764, #020617 75%);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        [x-cloak] { display: none !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased">

    <!-- Main Container App -->
    <div x-data="sintaApp()" class="app-container" x-cloak>
        
        <!-- Animated Background Orbs -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
            <div class="absolute -top-20 -left-20 w-72 h-72 bg-purple-600/30 rounded-full mix-blend-screen filter blur-[60px] animate-blob"></div>
            <div class="absolute top-40 -right-20 w-72 h-72 bg-fuchsia-600/20 rounded-full mix-blend-screen filter blur-[60px] animate-blob" style="animation-delay: 2s;"></div>
            <div class="absolute -bottom-20 left-20 w-72 h-72 bg-blue-600/20 rounded-full mix-blend-screen filter blur-[60px] animate-blob" style="animation-delay: 4s;"></div>
        </div>

        <!-- SECTION 1: LANDING PAGE -->
        <div x-show="step === 1" x-transition.opacity class="flex-1 flex flex-col items-center justify-center p-6 text-center relative z-10 w-full h-full pt-24">
            <!-- Navigasi Image Replacement -->
            <div class="absolute top-6 left-0 w-full z-20 flex justify-center px-6">
                <img src="assets/nav.png" alt="Navigasi SINTA" class="w-full max-w-[18rem] h-auto object-contain drop-shadow-[0_5px_15px_rgba(168,85,247,0.7)] animate-[slideUp_0.5s_ease-out]">
            </div>
            
            <div class="my-auto w-full flex flex-col items-center mt-12">
                <h1 class="text-[3.5rem] leading-none font-extrabold mb-3 bg-gradient-to-r from-purple-400 via-fuchsia-300 to-purple-400 bg-[length:200%_auto] bg-clip-text text-transparent drop-shadow-lg tracking-tight animate-gradient">SINTA</h1>
                <h2 class="text-[17px] font-semibold text-purple-200/90 mb-8 leading-relaxed tracking-wide animate-[pulse_4s_ease-in-out_infinite]">Sari Animasi Kesehatan<br>Jantung Talang</h2>
                
                <div class="relative mb-8 h-48 w-48 flex items-center justify-center">
                    <!-- Glow Effect -->
                    <div class="absolute inset-0 bg-purple-600/30 rounded-full blur-3xl animate-pulse"></div>
                    <!-- Image with fallback -->
                    <img src="assets/sinta_senang.png" alt="Mascot Sinta" class="relative z-10 w-48 h-48 object-contain animate-alive drop-shadow-2xl" onerror="this.onerror=null; this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Sinta'">
                </div>
                
                <div class="relative bg-slate-800/40 border border-purple-500/30 backdrop-blur-md rounded-2xl p-4 px-5 mx-2 shadow-[0_0_20px_rgba(168,85,247,0.15)] mt-4 animate-[slideUp_0.8s_ease-out]">
                    <div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-900 border border-purple-500/50 px-4 py-0.5 rounded-full text-[10px] text-fuchsia-300 tracking-widest font-bold shadow-sm whitespace-nowrap">INFO SEHAT</div>
                    <p class="text-slate-200 text-[14px] italic leading-relaxed text-center font-medium drop-shadow-sm mt-1">
                        "Halo, dulur! Ayo luangkan waktu <span class="text-fuchsia-300 font-bold px-1">2 menit</span> untuk cek risiko kesehatan jantung dan lingkungan rumah Anda."
                    </p>
                </div>
            </div>
            
            <div class="mt-auto w-full pb-4">
                <button @click="step = 2" class="w-full bg-gradient-to-r from-purple-700 to-fuchsia-600 hover:from-purple-600 hover:to-fuchsia-500 text-white font-bold py-4 px-6 rounded-2xl shadow-[0_0_20px_rgba(168,85,247,0.5)] transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3 border border-purple-400/30">
                    <span class="text-lg text-shadow">Mulai Skrining Sekarang</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                      <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- SECTION 2: KUESIONER & SIMULASI -->
        <div x-show="step === 2" x-transition.opacity class="flex-1 flex flex-col w-full h-full relative z-10 overflow-hidden">
            
            <!-- HEADER / NAVBAR -->
            <div class="bg-slate-900 border-b border-purple-900/80 shadow-[0_5px_15px_rgba(0,0,0,0.3)] px-5 pt-5 pb-4 z-20 shrink-0">
                <!-- Top Info -->
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[11px] font-bold uppercase tracking-widest text-purple-300 bg-purple-900/30 px-2 py-1 rounded border border-purple-500/20" x-text="'PERTANYAAN ' + (currentQuestionIndex + 1) + ' DARI ' + activeQuestions.length"></span>
                    <span class="text-[11px] font-bold uppercase tracking-widest text-fuchsia-300 bg-fuchsia-900/30 px-2 py-1 rounded border border-fuchsia-500/20" x-text="currentQuestion.type === 'kardio' ? 'KLUSTER KARDIO' : 'KLUSTER MENULAR'"></span>
                </div>
                
                <!-- Navbar Main: Mascot & Title -->
                <div class="flex items-center gap-4">
                    <img :src="currentMascot" alt="Mascot" class="w-16 h-16 object-contain transition-all duration-300 drop-shadow-[0_5px_10px_rgba(0,0,0,0.5)]" onerror="this.onerror=null; this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Sinta2'">
                    <h3 class="font-extrabold text-2xl text-white tracking-tight drop-shadow-md">SINTA: <span class="text-purple-300">Skrining</span></h3>
                </div>
            </div>

            <!-- Progress Line -->
            <div class="w-full bg-slate-800 h-1 shrink-0">
                <div class="bg-gradient-to-r from-purple-500 to-fuchsia-500 h-full transition-all duration-500 ease-out" :style="'width: ' + ((currentQuestionIndex + 1) / activeQuestions.length * 100) + '%'"></div>
            </div>

            <!-- PUSAT SIMULASI JANTUNG ANATOMI (Center Stage) -->
            <div class="flex-1 flex flex-col items-center justify-center relative p-4 z-0 w-full overflow-hidden">
                <!-- Heart Animation Container -->
                <div class="relative w-44 h-44 sm:w-52 sm:h-52 flex items-center justify-center transition-all duration-500 mb-6" :class="heartAnimation + ' ' + heartGlow()">
                    <!-- Background Glow -->
                    <div class="absolute inset-0 rounded-full blur-[40px] opacity-40 transition-colors duration-500" :class="heartBgGlow()"></div>
                    
                    <!-- Anatomical Heart SVG (Cartoon Style) -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="w-full h-full relative z-10 drop-shadow-2xl">
                        <!-- Superior Vena Cava -->
                        <path d="M 85 60 L 85 20 Q 95 10 100 20 L 100 60 Z" fill="#3b82f6"/>
                        <!-- Aorta -->
                        <path d="M 105 65 L 105 25 Q 105 5 125 5 Q 145 5 145 20 Q 145 35 135 45 L 125 65 Z" fill="#ef4444"/>
                        <path d="M 115 12 L 115 2 L 125 2 L 125 12 Z" fill="#ef4444"/>
                        <path d="M 130 15 L 130 5 L 140 5 L 140 15 Z" fill="#ef4444"/>
                        <!-- Pulmonary Artery -->
                        <path d="M 120 70 L 120 40 Q 120 30 150 30 Q 160 30 160 40 L 140 65 Z" fill="#3b82f6"/>
                        <path d="M 150 30 L 170 20 L 175 30 L 155 40 Z" fill="#3b82f6"/>
                        <!-- Right Atrium -->
                        <path d="M 85 65 Q 50 65 50 95 Q 50 115 75 125 Z" fill="#dc2626"/>
                        <!-- Left Atrium -->
                        <path d="M 135 70 Q 170 75 170 100 Q 170 120 135 120 Z" fill="#dc2626"/>
                        <!-- Ventricles -->
                        <path d="M 65 105 Q 55 165 100 190 Q 155 165 145 105 Q 125 85 100 85 Q 85 85 65 105 Z" fill="#ef4444"/>
                        <!-- Sulcus/Veins on Ventricle -->
                        <path d="M 100 95 Q 105 145 100 185" stroke="#991b1b" stroke-width="4" fill="none"/>
                        <path d="M 95 95 Q 95 135 100 180" stroke="#3b82f6" stroke-width="2.5" fill="none"/>
                        <path d="M 100 125 Q 80 145 75 165" stroke="#3b82f6" stroke-width="2.5" fill="none"/>
                        <path d="M 100 145 Q 130 155 135 165" stroke="#991b1b" stroke-width="2.5" fill="none"/>
                        <!-- Highlight -->
                        <path d="M 80 115 Q 70 145 105 180" stroke="#f87171" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
                    </svg>
                </div>

                <!-- Status Badges -->
                <div class="flex flex-col items-center gap-3">
                    <span class="px-6 py-2 rounded-full text-[15px] font-black uppercase tracking-widest transition-colors duration-500 shadow-[0_5px_15px_rgba(0,0,0,0.4)]" :class="heartBadgeBg()" x-text="totalSkor <= 2 ? 'NORMAL' : (totalSkor <= 4 ? 'WASPADA' : 'BAHAYA')"></span>
                    
                    <div class="bg-slate-900/80 backdrop-blur-md border border-slate-700/80 px-5 py-2 rounded-xl flex items-center gap-3 shadow-inner">
                        <span class="text-xs text-slate-400 font-semibold uppercase tracking-widest">Poin Risiko:</span>
                        <span class="text-2xl font-black text-white font-mono drop-shadow-md" x-text="totalSkor"></span>
                    </div>
                </div>
            </div>

            <!-- PANEL KUESIONER (Keyboard-Style) -->
            <div class="bg-slate-900 rounded-t-[2.5rem] border-t border-purple-800/40 shadow-[0_-15px_40px_rgba(0,0,0,0.6)] p-6 pb-8 z-20 shrink-0 w-full animate-slide-up">
                <!-- Question Text -->
                <div class="min-h-[70px] flex items-center justify-center mb-6">
                    <p class="text-[16px] sm:text-[17px] text-white font-medium leading-relaxed text-center" x-text="currentQuestion.text"></p>
                </div>

                <!-- Action Buttons -->
                <div class="w-full">
                    <!-- Standard Ya/Tidak Options -->
                    <template x-if="!currentQuestion.isCustom">
                        <div class="flex flex-row gap-4">
                            <button @click="nextQuestion('ya')" 
                                    :disabled="isTransitioning"
                                    :class="(selectedAnswer === 'ya' || isTransitioning) ? 'opacity-50 pointer-events-none' : ''"
                                    class="flex-1 bg-slate-800 border-2 border-slate-700 hover:bg-purple-900/40 hover:border-purple-500 rounded-2xl py-4 transition-all duration-200 font-bold text-white flex items-center justify-center gap-3 active:scale-95 shadow-lg group">
                                <span class="text-2xl drop-shadow-md group-hover:scale-110 transition-transform">👍</span>
                                <span class="text-lg tracking-wide">YA</span>
                            </button>
                            <button @click="nextQuestion('tidak')" 
                                    :disabled="isTransitioning"
                                    :class="(selectedAnswer === 'tidak' || isTransitioning) ? 'opacity-50 pointer-events-none' : ''"
                                    class="flex-1 bg-slate-800 border-2 border-slate-700 hover:bg-slate-700 hover:border-slate-500 rounded-2xl py-4 transition-all duration-200 font-bold text-white flex items-center justify-center gap-3 active:scale-95 shadow-lg group">
                                <span class="text-2xl drop-shadow-md group-hover:scale-110 transition-transform">👎</span>
                                <span class="text-lg tracking-wide">TIDAK</span>
                            </button>
                        </div>
                    </template>

                    <!-- Custom Options (e.g. Frequency) -->
                    <template x-if="currentQuestion.isCustom">
                        <div class="flex flex-col gap-3">
                            <template x-for="opt in currentQuestion.customOptions">
                                <button @click="nextQuestion(opt.val)" 
                                        :disabled="isTransitioning"
                                        :class="(selectedAnswer === opt.val || isTransitioning) ? 'opacity-50 pointer-events-none' : ''"
                                        class="w-full bg-slate-800 border-2 border-slate-700 hover:bg-purple-900/40 hover:border-purple-500 rounded-xl py-3 px-5 transition-all duration-200 font-bold text-white flex items-center justify-start gap-4 active:scale-95 shadow-lg group text-left">
                                    <span class="text-3xl drop-shadow-md group-hover:scale-110 transition-transform" x-text="opt.icon"></span>
                                    <span class="text-[15px] tracking-wide" x-text="opt.label"></span>
                                </button>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- SECTION 3: HASIL & REKOMENDASI -->
        <div x-show="step === 3" x-transition.opacity class="flex-1 flex flex-col items-center justify-start p-6 text-center relative z-10 w-full h-full overflow-y-auto hide-scrollbar bg-slate-950">
            
            <div class="w-full flex items-center justify-center mb-6 mt-6 shrink-0">
                <span class="px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest border" :class="resultBadgeColor()" x-text="'Skrining Selesai'"></span>
            </div>
            
            <h2 class="text-3xl font-black mb-8 drop-shadow-md shrink-0" :class="resultColor()">Hasil Skrining</h2>

            <!-- Center Mascot -->
            <div class="relative w-44 h-44 mb-8 flex items-center justify-center shrink-0">
                <div class="absolute inset-0 rounded-full blur-[40px] opacity-40 animate-pulse" :class="resultBgColor()"></div>
                <img :src="currentMascot" alt="Mascot Sinta" class="relative z-10 w-full h-full object-contain animate-alive drop-shadow-[0_15px_25px_rgba(0,0,0,0.5)]" onerror="this.onerror=null; this.src='https://api.dicebear.com/7.x/bottts/svg?seed=Sinta3'">
            </div>

            <!-- Results Card -->
            <div class="bg-slate-900 border border-slate-700/80 rounded-[2rem] p-6 mb-8 w-full relative overflow-hidden shadow-2xl shrink-0 flex flex-col">
                <div class="absolute top-0 left-0 w-2 h-full" :class="resultBgColor()"></div>
                
                <div class="flex justify-between items-start mb-5">
                    <div class="text-left">
                        <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">Status Anda</p>
                        <p class="text-[20px] text-white font-black uppercase tracking-wide leading-tight" x-text="dynamicResult.title"></p>
                    </div>
                    <div class="bg-slate-950 rounded-2xl px-4 py-2 border border-slate-800 text-center shadow-inner shrink-0 ml-2">
                        <span class="block text-[10px] text-slate-400 font-medium uppercase tracking-widest mb-1">Poin</span>
                        <span class="text-3xl font-black text-white drop-shadow-sm" x-text="totalSkor"></span>
                    </div>
                </div>
                
                <!-- Dynamic Descriptions -->
                <div class="w-full flex flex-col gap-3 text-left overflow-y-auto max-h-[30vh] hide-scrollbar pr-1 mt-2">
                    <template x-for="(desc, index) in dynamicResult.descriptions" :key="index">
                        <div class="bg-slate-800/80 rounded-xl p-4 border border-slate-700/50 shadow-inner">
                            <p class="text-[14px] text-slate-200 leading-relaxed font-medium" x-html="formatDesc(desc)"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Actions -->
            <div class="w-full space-y-4 mt-auto shrink-0 pb-6">
                <button @click="shareToWA()" class="w-full bg-gradient-to-r from-[#25D366] to-[#1DA851] hover:from-[#128C7E] hover:to-[#128C7E] text-white font-bold py-4 px-6 rounded-2xl shadow-[0_0_20px_rgba(37,211,102,0.3)] transition-all transform hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3 border border-[#25D366]/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                    </svg>
                    Bagikan ke WhatsApp Keluarga
                </button>
                <button @click="restart()" class="w-full bg-slate-900 hover:bg-slate-800 text-slate-300 font-bold py-4 px-6 rounded-2xl transition-all border border-slate-700 shadow-lg">
                    Ulangi Skrining
                </button>
            </div>
        </div>

    </div>

    <!-- Alpine.js Application Logic -->
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('sintaApp', () => ({
                step: 1,
                currentQuestionIndex: 0,
                answers: {},
                selectedAnswer: null,
                isTransitioning: false,
                
                allQuestions: [
                    { id: 'q_rokok', type: 'kardio', text: "Apakah Anda memiliki kebiasaan merokok?" },
                    { id: 'q_rokok_freq', type: 'kardio', text: "Seberapa sering Anda merokok?", isCustom: true, customOptions: [{label: 'Jarang (1-3 batang/hari)', val: 'jarang', icon: '🚬'}, {label: 'Sering (>3 batang/hari)', val: 'sering', icon: '🔥'}], condition: (ans) => ans.q_rokok === 'ya' },
                    { id: 'q_gorengan', type: 'kardio', text: "Apakah Anda sering mengonsumsi makanan berminyak atau gorengan?" },
                    { id: 'q_gorengan_freq', type: 'kardio', text: "Berapa kali Anda makan gorengan?", isCustom: true, customOptions: [{label: 'Jarang (1-3 kali/minggu)', val: 'jarang', icon: '🍟'}, {label: 'Hampir Setiap Hari', val: 'sering', icon: '🍗'}], condition: (ans) => ans.q_gorengan === 'ya' },
                    { id: 'q_aktivitas', type: 'kardio', text: "Apakah Anda jarang berolahraga (kurang dari 30 menit/minggu) atau lebih banyak duduk saat beraktivitas?" },
                    { id: 'q_gejala', type: 'kardio', text: "Apakah Anda sering merasa dada nyeri/ampek, sesak napas saat berjalan dekat, atau punya riwayat tensi tinggi?" },
                    { id: 'q_batuk', type: 'menular', text: "Apakah Anda atau keluarga di rumah mengalami batuk tidak sembuh-sembuh lebih dari 2 minggu?" },
                    { id: 'q_lingkungan', type: 'menular', text: "Apakah di sekitar rumah Anda terdapat genangan air yang jarang dikuras atau tumpukan barang bekas?" },
                    { id: 'q_sanitasi', type: 'menular', text: "Apakah sumber air di rumah Anda kurang bersih, atau Anda jarang cuci tangan pakai sabun sebelum makan?" }
                ],

                get activeQuestions() {
                    return this.allQuestions.filter(q => !q.condition || q.condition(this.answers));
                },

                get currentQuestion() {
                    return this.activeQuestions[this.currentQuestionIndex];
                },

                get totalSkor() {
                    let score = 0;
                    if (this.answers.q_rokok === 'ya') {
                        if (this.answers.q_rokok_freq === 'jarang') score += 3;
                        if (this.answers.q_rokok_freq === 'sering') score += 5;
                    }
                    if (this.answers.q_gorengan === 'ya') {
                        if (this.answers.q_gorengan_freq === 'jarang') score += 1;
                        if (this.answers.q_gorengan_freq === 'sering') score += 2;
                    }
                    if (this.answers.q_aktivitas === 'ya') score += 1;
                    if (this.answers.q_gejala === 'ya') score += 2; // Gejala medis serius
                    if (this.answers.q_batuk === 'ya') score += 1;
                    if (this.answers.q_lingkungan === 'ya') score += 1;
                    if (this.answers.q_sanitasi === 'ya') score += 1;
                    return score;
                },

                get currentMascot() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'assets/sinta_senang.png';
                    if (total <= 4) return 'assets/sinta_mengingatkan.png';
                    return 'assets/sinta_cemas.png';
                },

                get heartAnimation() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'animate-heart-slow';
                    if (total <= 4) return 'animate-heart-medium';
                    return 'animate-heart-fast';
                },

                heartGlow() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'drop-shadow-[0_0_25px_rgba(34,197,94,0.6)]';
                    if (total <= 4) return 'drop-shadow-[0_0_35px_rgba(250,204,21,0.7)]';
                    return 'drop-shadow-[0_0_45px_rgba(239,68,68,0.9)]';
                },

                heartBgGlow() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'bg-green-500';
                    if (total <= 4) return 'bg-yellow-500';
                    return 'bg-red-600';
                },

                heartBadgeBg() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'bg-green-400 text-slate-900';
                    if (total <= 4) return 'bg-yellow-400 text-slate-900';
                    return 'bg-red-500 text-white';
                },

                resultColor() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'text-green-400';
                    if (total <= 4) return 'text-yellow-400';
                    return 'text-red-500';
                },
                
                resultBgColor() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'bg-green-500';
                    if (total <= 4) return 'bg-yellow-500';
                    return 'bg-red-600';
                },

                resultBadgeColor() {
                    let total = this.totalSkor;
                    if (total <= 2) return 'bg-green-900/50 text-green-300 border-green-500/50';
                    if (total <= 4) return 'bg-yellow-900/50 text-yellow-300 border-yellow-500/50';
                    return 'bg-red-900/50 text-red-300 border-red-500/50';
                },

                get dynamicResult() {
                    let result = { title: '', descriptions: [] };
                    let total = this.totalSkor;
                    
                    if (total <= 2) result.title = 'ZONA HIJAU (Aman)';
                    else if (total <= 4) result.title = 'ZONA KUNING (Waspada)';
                    else result.title = 'ZONA MERAH (Bahaya)';
                    
                    if (total === 0) {
                        result.descriptions.push("✨ **Luar Biasa!** Gaya hidup Anda sangat sehat tanpa ada faktor risiko. Terus pertahankan pola makan seimbang, olahraga teratur, dan kebersihan lingkungan yang baik.");
                        return result;
                    }

                    // Rokok
                    if (this.answers.q_rokok === 'ya') {
                        if (this.answers.q_rokok_freq === 'sering') {
                            result.descriptions.push("🚭 **Bahaya Merokok Berat:** Asap rokok sangat merusak pembuluh darah jantung dan paru-paru Anda secara drastis. **Saran:** Segera kurangi dan konsultasikan ke Puskesmas untuk program berhenti merokok.");
                        } else if (this.answers.q_rokok_freq === 'jarang') {
                            result.descriptions.push("🚭 **Waspada Merokok:** Walau jarang, rokok tetap memicu penumpukan plak di jantung. **Saran:** Cobalah berhenti sepenuhnya untuk jantung yang lebih lega.");
                        } else {
                            result.descriptions.push("🚭 **Peringatan Rokok:** Berhenti merokok adalah hal terbaik untuk kesehatan jantung.");
                        }
                    }
                    
                    // Gorengan
                    if (this.answers.q_gorengan === 'ya') {
                        if (this.answers.q_gorengan_freq === 'sering') {
                            result.descriptions.push("🍟 **Bahaya Kolesterol:** Konsumsi gorengan harian memicu penyumbatan lemak di pembuluh darah jantung. **Saran:** Batasi maksimal 2 kali seminggu, perbanyak makanan rebus/kukus.");
                        } else if (this.answers.q_gorengan_freq === 'jarang') {
                            result.descriptions.push("🍟 **Waspada Gorengan:** Hindari konsumsi minyak berlebih agar tidak terjadi penumpukan lemak jahat.");
                        }
                    }
                    
                    // Aktivitas
                    if (this.answers.q_aktivitas === 'ya') {
                        result.descriptions.push("🏃 **Kurang Gerak:** Otot jantung Anda kurang terlatih. **Saran:** Sempatkan jalan kaki atau aktivitas fisik ringan minimal 30 menit sehari.");
                    }
                    
                    // Gejala Medis
                    if (this.answers.q_gejala === 'ya') {
                        result.descriptions.push("⚠️ **Gejala Klinis Terdeteksi:** Nyeri dada dan sesak napas adalah alarm dari jantung! **Saran:** SEGERA periksakan diri ke Puskesmas atau Posko KKN terdekat untuk cek tensi gratis.");
                    }
                    
                    // Menular
                    if (this.answers.q_batuk === 'ya') {
                        result.descriptions.push("😷 **Risiko Menular (Pernapasan):** Batuk lebih dari 2 minggu bisa mengindikasikan infeksi paru seperti TBC. **Saran:** Segera periksa ke layanan kesehatan agar mendapat pengobatan dan tidak menular ke keluarga.");
                    }
                    
                    if (this.answers.q_lingkungan === 'ya') {
                        result.descriptions.push("🦟 **Lingkungan Rawan Penyakit:** Genangan air dan tumpukan barang adalah sarang nyamuk DBD. **Saran:** Terapkan 3M Plus (Menguras, Menutup, Mengubur) secara rutin.");
                    }
                    
                    if (this.answers.q_sanitasi === 'ya') {
                        result.descriptions.push("🧼 **Sanitasi Kurang:** Kurang kebersihan air dan tangan memicu diare hingga tipes. **Saran:** Biasakan Cuci Tangan Pakai Sabun (CTPS) di bawah air mengalir.");
                    }
                    
                    return result;
                },

                formatDesc(text) {
                    return text.replace(/\*\*(.*?)\*\*/g, '<span class="text-fuchsia-300 font-bold">$1</span>');
                },

                nextQuestion(answerVal) {
                    if (this.isTransitioning) return;
                    this.isTransitioning = true;
                    this.selectedAnswer = answerVal;

                    let qId = this.currentQuestion.id;
                    this.answers[qId] = answerVal;

                    setTimeout(() => {
                        this.selectedAnswer = null;
                        this.isTransitioning = false;
                        
                        if (this.currentQuestionIndex < this.activeQuestions.length - 1) {
                            this.currentQuestionIndex++;
                        } else {
                            this.step = 3;
                        }
                    }, 350);
                },

                restart() {
                    this.step = 1;
                    this.currentQuestionIndex = 0;
                    this.answers = {};
                    this.selectedAnswer = null;
                    this.isTransitioning = false;
                },

                shareToWA() {
                    const title = this.dynamicResult.title;
                    const text = `Ayo cek risiko kesehatan jantung & lingkunganmu dengan SINTA (Sari Animasi Kesehatan Jantung Talang)!\n\n*Hasil skrining saya:*\nStatus: ${title}\n\nCek sekarang di: ${window.location.href}`;
                    const waUrl = "https://api.whatsapp.com/send?text=" + encodeURIComponent(text);
                    window.open(waUrl, '_blank');
                }
            }));
        });
    </script>
</body>
</html>
